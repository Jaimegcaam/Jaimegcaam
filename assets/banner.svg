<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" role="img" aria-label="Jaime Garcia Caamańo">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="45%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>
  <rect width="1200" height="280" fill="url(#grid)"/>

  <circle cx="980" cy="60" r="120" fill="#6366f1" fill-opacity="0.12"/>
  <circle cx="180" cy="220" r="90" fill="#22d3ee" fill-opacity="0.10"/>

  <text x="80" y="118" fill="#f8fafc" font-family="Segoe UI, system-ui, sans-serif" font-size="52" font-weight="700">
    Jaime Garcia Caamańo
  </text>
  <text x="80" y="162" fill="#cbd5e1" font-family="Segoe UI, system-ui, sans-serif" font-size="22" font-weight="400">
    DevOps Engineer · Cloud Infrastructure · Open Source
  </text>

  <rect x="80" y="188" width="320" height="4" rx="2" fill="url(#accent)" filter="url(#glow)"/>

  <text x="80" y="238" fill="#94a3b8" font-family="Segoe UI, system-ui, sans-serif" font-size="16">
    Madrid, Spain
  </text>
</svg>
